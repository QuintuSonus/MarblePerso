name: Deploy mechanic preview

on:
  push:
    branches: ['mechanic/**']

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract mechanic name
        id: mechanic
        run: |
          # mechanic/magnet-box -> magnet-box
          NAME=$(echo "${{ github.ref_name }}" | sed 's|^mechanic/||')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying preview for mechanic: $NAME"

      - name: Deploy to gh-pages preview subdirectory
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          destination_dir: preview/${{ steps.mechanic.outputs.name }}
          keep_files: true
          exclude_assets: '.github,.claude,.git'

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const mechanicName = '${{ steps.mechanic.outputs.name }}';
            const previewUrl = `https://quintusonus.github.io/MarblePerso/preview/${mechanicName}/`;
            const branch = context.ref.replace('refs/heads/', '');

            // Find open PR for this branch
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open'
            });

            if (prs.length === 0) {
              console.log('No open PR found for branch ' + branch);
              return;
            }

            const pr = prs[0];
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}\n**Preview deployed!** Test this mechanic here:\n${previewUrl}\n\nOpen the link, click **Import Level**, and paste a test level JSON to play.`;

            // Check if we already commented
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: body
              });
            }
