name: Cleanup mechanic preview

on:
  delete:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.ref_type == 'branch' && startsWith(github.event.ref, 'mechanic/')
    runs-on: ubuntu-latest
    steps:
      - name: Extract mechanic name
        id: mechanic
        run: |
          NAME=$(echo "${{ github.event.ref }}" | sed 's|^mechanic/||')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Cleaning up preview for mechanic: $NAME"

      - uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview directory
        run: |
          PREVIEW_DIR="preview/${{ steps.mechanic.outputs.name }}"
          if [ -d "$PREVIEW_DIR" ]; then
            rm -rf "$PREVIEW_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Remove preview for ${{ steps.mechanic.outputs.name }}" || echo "Nothing to commit"
            git push
          else
            echo "Preview directory $PREVIEW_DIR not found, nothing to clean up"
          fi
